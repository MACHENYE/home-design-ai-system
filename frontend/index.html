<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家装智能设计系统</title>
    <link rel="stylesheet" href="vendor/element-plus.css" />
    <link rel="stylesheet" href="styles.css?v=20260427-4" />
  </head>
  <body>
    <div id="app" v-cloak>
      <section v-if="!isAuthenticated" class="auth-shell">
        <div class="auth-card">
          <div class="brand auth-brand">
            <div class="brand-mark">AI</div>
            <div>
              <h1>家装设计图生成</h1>
              <p>登录后管理你的历史记录和收藏方案</p>
            </div>
          </div>

          <el-tabs v-model="authMode" stretch>
            <el-tab-pane label="登录" name="login"></el-tab-pane>
            <el-tab-pane label="注册" name="register"></el-tab-pane>
          </el-tabs>

          <el-form label-position="top" class="compact-form" @submit.prevent>
            <el-form-item label="账号">
              <el-input v-model="authForm.username" maxlength="32" clearable autocomplete="username"></el-input>
            </el-form-item>
            <el-form-item label="密码">
              <el-input
                v-model="authForm.password"
                type="password"
                maxlength="128"
                show-password
                autocomplete="current-password"
                @keyup.enter="submitAuth"
              ></el-input>
            </el-form-item>
            <el-button class="generate-button auth-button" type="primary" size="large" :loading="authLoading" @click="submitAuth">
              {{ authMode === "login" ? "登录" : "注册并登录" }}
            </el-button>
          </el-form>
        </div>
      </section>

      <template v-else>
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <h1>家装设计图生成</h1>
          </div>
        </div>
        <div class="user-box">
          <el-tag effect="plain">{{ currentUser.username }}</el-tag>
          <el-button size="small" @click="logout">退出登录</el-button>
        </div>
      </header>

      <main class="workspace">
        <section class="panel control-panel">
          <div class="panel-head">
            <div>
              <span class="eyebrow">1. 输入素材</span>
              <h2>上传底稿和参考图</h2>
            </div>
          </div>

          <div class="upload-grid">
            <el-upload
              class="upload-box"
              :class="{ 'has-image': Boolean(draftPreview) }"
              drag
              :show-file-list="false"
              :auto-upload="false"
              accept="image/*"
              :on-change="(file) => handleFile(file, 'draft')"
            >
              <div v-if="draftPreview" class="upload-preview-content">
                <img :src="draftPreview" alt="draft" />
                <div>
                  <strong>&#35774;&#35745;&#24213;&#31295;</strong>
                  <span>{{ draftState }}</span>
                </div>
              </div>
              <template v-else>
                <strong>&#35774;&#35745;&#24213;&#31295;</strong>
                <span>{{ draftState }}</span>
              </template>
            </el-upload>

            <el-upload
              class="upload-box"
              :class="{ 'has-image': Boolean(refPreview) }"
              drag
              :show-file-list="false"
              :auto-upload="false"
              accept="image/*"
              :on-change="(file) => handleFile(file, 'ref')"
            >
              <div v-if="refPreview" class="upload-preview-content">
                <img :src="refPreview" alt="reference" />
                <div>
                  <strong>&#39118;&#26684;&#21442;&#32771;</strong>
                  <span>{{ refState }}</span>
                </div>
              </div>
              <template v-else>
                <strong>&#39118;&#26684;&#21442;&#32771;</strong>
                <span>{{ refState }}</span>
              </template>
            </el-upload>
          </div>

          <div class="section-divider"></div>

          <div class="panel-head tight">
            <div>
              <span class="eyebrow">2. 设计需求</span>
              <h2>选择风格并描述想要的效果</h2>
            </div>
          </div>

          <div class="preset-row">
            <button
              v-for="preset in quickPresets"
              :key="preset.name"
              type="button"
              class="preset-chip"
              :class="{ active: isPresetActive(preset) }"
              @click="applyQuickPreset(preset)"
            >
              <strong>{{ preset.name }}</strong>
              <span>{{ preset.desc }}</span>
            </button>
          </div>

          <el-form label-position="top" class="compact-form">
            <div class="form-grid">
              <el-form-item label="空间">
                <el-select v-model="form.room_type" filterable>
                  <el-option v-for="item in presets.roomTypes" :key="item" :label="item" :value="item"></el-option>
                </el-select>
              </el-form-item>
              <el-form-item label="风格">
                <el-select v-model="form.design_style" filterable>
                  <el-option v-for="item in presets.styles" :key="item" :label="item" :value="item"></el-option>
                </el-select>
              </el-form-item>
              <el-form-item label="色彩">
                <el-select v-model="form.color_preference" filterable>
                  <el-option v-for="item in presets.colors" :key="item" :label="item" :value="item"></el-option>
                </el-select>
              </el-form-item>
              <el-form-item label="材质">
                <el-select v-model="form.material_preference" filterable>
                  <el-option v-for="item in presets.materials" :key="item" :label="item" :value="item"></el-option>
                </el-select>
              </el-form-item>
            </div>

            <el-form-item label="需求描述">
              <el-input v-model="form.prompt" type="textarea" :rows="5" resize="vertical"></el-input>
            </el-form-item>

            <div class="prompt-chip-group">
              <el-tag
                v-for="chip in promptChips"
                :key="chip"
                class="prompt-chip"
                effect="plain"
                @click="appendPrompt(chip)"
              >
                {{ chip }}
              </el-tag>
            </div>

            <details class="minor-options">
              <summary>高级设置</summary>
              <el-form-item label="排除项">
                <el-input v-model="form.negative_prompt" clearable></el-input>
              </el-form-item>
              <el-form-item label="保持原有结构">
                <el-switch v-model="form.keep_structure" inline-prompt active-text="开" inactive-text="关"></el-switch>
              </el-form-item>
              <el-form-item label="局部重绘笔刷">
                <el-slider v-model="brushSize" :min="8" :max="72"></el-slider>
              </el-form-item>
              <div class="canvas-stack">
                <canvas ref="draftCanvasRef" width="960" height="540"></canvas>
                <canvas ref="maskCanvasRef" width="960" height="540"></canvas>
              </div>
              <div class="mask-actions">
                <el-tag size="small" :type="maskDirty ? 'success' : 'info'">{{ maskState }}</el-tag>
                <el-button size="small" @click="clearMask">清空掩码</el-button>
              </div>
            </details>
          </el-form>

          <div class="submit-bar">
            <el-button class="generate-button" type="primary" size="large" :loading="submitting" @click="submitDesign">开始生成设计图</el-button>
            <span>{{ taskStateText }}</span>
          </div>
        </section>

        <aside class="panel result-panel">
          <div class="panel-head">
            <div>
              <span class="eyebrow">3. 生成结果</span>
              <h2>查看和保存方案</h2>
            </div>
          </div>

          <div class="result-layout">
            <div class="result-main-column">
              <div class="result-box">
                <el-image v-if="displayResultImage" :src="displayResultImage" fit="contain" class="result-image"></el-image>
                <div v-else-if="isGenerating" class="generating-state">
                  <div class="generating-loader"></div>
                  <strong>正在生成设计图</strong>
                  <p>{{ taskStateText }}</p>
                </div>
                <el-empty v-else description="生成后的设计图会显示在这里"></el-empty>
              </div>
              <el-alert
                v-if="isGenerating && displayResultImage"
                class="generating-inline-alert"
                type="info"
                :closable="false"
                show-icon
                :title="`新方案仍在生成中：${taskStateText}`"
              ></el-alert>

              <div class="result-actions">
                <div class="inline-actions">
                  <el-button type="primary" plain :disabled="!displayResultImage" @click="saveCurrentScheme">收藏当前方案</el-button>
                  <el-button plain :disabled="!displayResultImage" @click="downloadResultImage">下载图片</el-button>
                </div>
                <el-tag effect="plain">{{ currentTaskId ? shortTaskId(currentTaskId) : "未开始" }}</el-tag>
              </div>

              <div class="preview-grid">
              <div class="preview-card">
                <label>底稿</label>
                  <el-image v-if="displayDraftPreview" :src="displayDraftPreview" fit="cover"></el-image>
                <span v-else>未上传</span>
              </div>
              <div class="preview-card">
                <label>参考</label>
                  <el-image v-if="displayRefPreview" :src="displayRefPreview" fit="cover"></el-image>
                <span v-else>可选</span>
              </div>
              </div>
            </div>

            <div class="result-detail-column">
              <div class="record-detail compact-record-detail">
                <div class="small-title">
                  <strong>历史方案详情</strong>
                  <div class="inline-actions">
                    <el-button size="small" plain :disabled="!canCompareRecord()" @click="compareRecordImages()">对比查看</el-button>
                    <el-button size="small" type="danger" plain :disabled="!selectedRecord" @click="deleteCurrentRecord">删除记录</el-button>
                  </div>
                </div>
                <div v-if="selectedRecord" class="detail-content">
                  <div class="detail-row">
                    <label>任务编号</label>
                    <span>{{ shortTaskId(selectedRecord.task_id) }}</span>
                  </div>
                  <div class="detail-grid">
                    <div>
                      <label>空间</label>
                      <span>{{ selectedRecord.room_type || "-" }}</span>
                    </div>
                    <div>
                      <label>风格</label>
                      <span>{{ selectedRecord.design_style || "-" }}</span>
                    </div>
                    <div>
                      <label>色彩</label>
                      <span>{{ selectedRecord.color_preference || "-" }}</span>
                    </div>
                    <div>
                      <label>材质</label>
                      <span>{{ selectedRecord.material_preference || "-" }}</span>
                    </div>
                  </div>
                  <div class="detail-row">
                    <label>提示词/设计需求</label>
                    <p>{{ selectedRecord.prompt }}</p>
                  </div>
                  <div class="detail-row" v-if="selectedRecord.negative_prompt">
                    <label>排除项</label>
                    <p>{{ selectedRecord.negative_prompt }}</p>
                  </div>
                  <div class="url-list">
                    <div v-if="selectedRecord.draft_image_url">
                      <label>底稿图片</label>
                      <button type="button" @click="previewImage(selectedRecord.draft_image_url, '底稿')">查看</button>
                    </div>
                    <div v-if="selectedRecord.reference_image_url">
                      <label>参考图地址</label>
                      <button type="button" @click="previewImage(selectedRecord.reference_image_url, '参考图')">查看</button>
                    </div>
                    <div v-if="selectedRecord.result_image_url">
                      <label>生成结果</label>
                      <button type="button" @click="previewImage(selectedRecord.result_image_url, '结果图')">查看</button>
                    </div>
                  </div>
                </div>
                <el-empty v-else description="点击最近任务查看完整记录" :image-size="64"></el-empty>
              </div>
            </div>
          </div>

          <div class="result-secondary-grid">
            <div class="favorite-block">
              <div class="small-title">
                <strong>收藏方案</strong>
                <div class="inline-actions">
                  <span>{{ savedSchemes.length }} 个</span>
                  <el-button size="small" @click="loadFavorites">同步</el-button>
                </div>
              </div>
              <div v-if="savedSchemes.length" class="favorite-list">
                <button
                  v-for="scheme in savedSchemes"
                  :key="scheme.id"
                  type="button"
                  class="favorite-item"
                  :class="{ active: scheme.id === selectedSavedSchemeId }"
                  @click="selectSavedScheme(scheme)"
                >
                  <el-image :src="scheme.image" fit="cover"></el-image>
                  <div>
                    <strong>{{ scheme.title }}</strong>
                    <span>{{ scheme.style || "未填写风格" }}</span>
                  </div>
                  <el-button size="small" text type="danger" @click.stop="removeFavorite(scheme)">删除</el-button>
                </button>
              </div>
              <el-empty v-else description="暂无收藏方案" :image-size="64"></el-empty>
            </div>

            <div class="history-block">
              <div class="small-title">
                <strong>最近任务</strong>
                <span>{{ history.length }} 条</span>
              </div>
              <div class="history-toolbar">
                <el-select
                  v-model="recordStyleFilter"
                  size="small"
                  clearable
                  placeholder="按风格筛选"
                  @change="loadDesignRecords"
                >
                  <el-option v-for="item in presets.styles" :key="item" :label="item" :value="item"></el-option>
                </el-select>
                <el-button size="small" @click="loadDesignRecords">同步</el-button>
              </div>
              <div v-if="history.length" class="history-list">
                <button
                  v-for="item in history"
                  :key="item.taskId"
                  type="button"
                  class="history-item"
                  :class="{ active: item.taskId === (selectedHistoryTaskId || currentTaskId) }"
                  @click="openHistory(item.taskId)"
                >
                  <strong>{{ shortTaskId(item.taskId) }}</strong>
                  <span>{{ item.status }}</span>
                </button>
              </div>
              <el-empty v-else description="暂无任务" :image-size="64"></el-empty>
            </div>
          </div>
        </aside>
      </main>
      <el-dialog v-model="imagePreview.visible" :title="imagePreview.title" width="82%" class="image-preview-dialog">
        <el-image :src="imagePreview.url" fit="contain" class="dialog-preview-image"></el-image>
      </el-dialog>
      <el-dialog v-model="comparePreview.visible" title="底稿 / 生成结果对比" width="88%" class="compare-preview-dialog">
        <div class="compare-preview-grid">
          <div>
            <label>底稿</label>
            <el-image :src="comparePreview.draftUrl" fit="contain" class="compare-preview-image"></el-image>
          </div>
          <div>
            <label>生成结果</label>
            <el-image :src="comparePreview.resultUrl" fit="contain" class="compare-preview-image"></el-image>
          </div>
        </div>
      </el-dialog>
      </template>
    </div>

    <script src="vendor/vue.global.prod.js"></script>
    <script src="vendor/element-plus.full.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
